name: Update version.txt on release

on:
  release:
    types: [published, edited]

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Verify pad2.tar exists in release assets
        id: check
        env:
          ASSETS: ${{ toJson(github.event.release.assets) }}
        run: |
          if echo "$ASSETS" | grep -q '"name": *"pad2.tar"'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "pad2.tar not found in release assets, skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version.txt
        if: steps.check.outputs.found == 'true'
        env:
          PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          # Format ngay release theo DDMMYY (vd: 250820)
          VERSION=$(date -u -d "$PUBLISHED_AT" +%d%m%y)
          echo "$VERSION" > version.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "Update version.txt to $VERSION" || {
            echo "No changes to commit."
            exit 0
          }
          git push
